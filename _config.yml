# The Site Configuration

theme: jekyll-theme-chirpy

lang: ko
timezone: Asia/Seoul

title: gseungho's log
tagline: 창업, 연구, 공부 기록
description: 창업 일지, AI 논문 리뷰, 프로젝트 기록을 남기는 공간

url: "https://gseungho.github.io"

github:
  username: gseungho

social:
  name: gseungho
  email: qaws4268@gmail.com
  links:
    - https://github.com/gseungho

webmaster_verifications:
  google:
  bing:

analytics:
  google:
    id:

# 비워두면 시스템 설정 따라 자동 전환 (사이드바에 다크/라이트 토글 표시)
theme_mode:

avatar:

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

baseurl: ""

# ------------ 아래는 수정 불필요 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
